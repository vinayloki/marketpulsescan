name: Keep Workflows Alive

# ──────────────────────────────────────────────────────────────────────
# WHY THIS EXISTS:
# GitHub automatically DISABLES scheduled workflows after 60 days of
# repository inactivity (no pushes at all, including bot commits that
# produced no data change on a market holiday weekend, etc.).
#
# This workflow runs on the 1st of every month and makes an empty
# git commit so the repo always shows activity — keeping all scheduled
# workflows permanently enabled without any manual intervention.
# ──────────────────────────────────────────────────────────────────────

on:
  schedule:
    # 1st of every month at 07:30 UTC
    - cron: '30 7 1 * *'
  workflow_dispatch:   # can also be triggered manually anytime

permissions:
  contents: write

jobs:
  keep-alive:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Ping — keep scheduled workflows active
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          # --allow-empty creates a commit even if no files changed
          git commit --allow-empty -m "chore: keep workflows alive [$(date -u +'%Y-%m')]"
          git push origin HEAD:main
          echo "✅ Keep-alive ping sent for $(date -u +'%B %Y')"
