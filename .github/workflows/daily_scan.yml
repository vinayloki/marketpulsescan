# ─────────────────────────────────────────────
# india-swing-scanner  |  Market Update Workflow
# ─────────────────────────────────────────────
name: Automated Market Update

on:
  schedule:
    - cron: '0 8 * * 1-5'   # 8:00 UTC Mon–Fri (adjust as needed)
  workflow_dispatch:         # Allow manual trigger

permissions:               # ✅ FIX 1 — Grant write access to contents
  contents: write

jobs:
  scan-and-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}  # ✅ FIX 2 — Pass token to git remote
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run market scanner
        run: python scanner.py   # replace with your actual script name

      - name: Commit and push scan results
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add scan_results/

          # Only commit if there are actual staged changes
          git diff --staged --quiet || git commit -m "Automated Market Update: $(date -u +'%Y-%m-%d')"

          # Push only if there was a commit (HEAD moved ahead of origin)
          git diff --quiet HEAD origin/${{ github.ref_name }} 2>/dev/null || git push origin HEAD:${{ github.ref_name }}
