name: Daily NSE Market Scan

on:
  schedule:
    - cron: '0 4 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-scanner-data:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install NSE Node Library
        run: npm install stock-nse-india

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run NSE Scanner
        run: python scanner.py

      - name: Fetch Market News
        run: python news_fetcher.py

      - name: Commit and Push Results
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add scan_results/
          git diff --staged --quiet || git commit -m "Automated Market Update: $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push origin HEAD:main
