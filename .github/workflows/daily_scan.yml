name: Daily NSE Market Scan

on:
  schedule:
    # 5:30 PM IST (12:00 UTC) Mon–Fri
    # NSE closes at 3:30 PM IST — extra buffer ensures yfinance has final EOD data
    - cron: '0 12 * * 1-5'
  workflow_dispatch:   # manual trigger anytime

# Prevent two daily runs from pushing at the same time
concurrency:
  group: daily-scan
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update-scanner-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0          # full history required for rebase

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements-actions.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-actions.txt

      - name: Run MarketPulse Scanner
        run: python scanner.py

      - name: Fetch Market News
        run: python news_fetcher.py
        continue-on-error: true   # non-fatal if RSS feed temporarily down

      - name: Update Market Regime
        run: python regime_filter.py
        continue-on-error: true   # non-fatal if NIFTY data temporarily unavailable

      - name: Run AI EOD Intelligence Engine
        run: python ai_engine.py
        continue-on-error: true   # non-fatal — scanner data is already written

      - name: Commit and Push Results
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          # Pull FIRST to incorporate any concurrent remote changes before committing
          git pull --rebase origin main
          git add scan_results/
          git diff --staged --quiet \
            && echo "ℹ️  No data changes — nothing to commit." \
            || git commit -m "📊 Daily Market Update: $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push origin HEAD:main
