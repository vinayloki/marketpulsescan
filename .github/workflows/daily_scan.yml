name: Daily NSE Market Scan

on:
  schedule:
    # 5:30 PM IST (12:00 UTC) Mon–Fri
    # NSE closes at 3:30 PM IST — extra buffer ensures yfinance has final EOD data
    - cron: '0 12 * * 1-5'
  workflow_dispatch:   # manual trigger anytime

# Prevent two daily runs from pushing at the same time
concurrency:
  group: daily-scan
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update-scanner-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0          # full history required for rebase

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements-actions.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-actions.txt

      - name: Run MarketPulse Scanner
        run: python scanner.py

      - name: Fetch Market News
        run: python news_fetcher.py
        continue-on-error: true   # non-fatal if RSS feed temporarily down

      - name: Update Market Regime
        run: python regime_filter.py
        continue-on-error: true   # non-fatal if NIFTY data temporarily unavailable

      - name: Run AI EOD Intelligence Engine
        run: python ai_engine.py
        continue-on-error: true   # non-fatal — scanner data is already written
        timeout-minutes: 10

      - name: Run Prediction Engine
        run: python prediction_engine.py --backtest-weeks 12
        continue-on-error: true   # non-fatal — predictions augment but don't replace scanner data
        timeout-minutes: 15

      - name: Validate Sector Labels
        continue-on-error: true   # informational only — does not block the scan
        run: |
          python -c "
import json, sys
from config.sector_map import CANONICAL_SECTORS
try:
    with open('scan_results/fundamentals.json') as f:
        data = json.load(f)
    stocks = data.get('stocks', [])
    invalid = [s.get('s','?') + ':' + str(s.get('sector','')) for s in stocks if s.get('sector') not in CANONICAL_SECTORS]
    if invalid:
        print(f'WARNING: {len(invalid)} stocks with non-canonical sectors: {set(s.split(\":\")[1] for s in invalid)}')
    else:
        print(f'OK: All {len(stocks)} sector labels are canonical.')
except Exception as e:
    print(f'Sector validation skipped: {e}')
"

      - name: Commit and Push Results
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # Stage only the scan_results we care about first
          git add scan_results/

          # Stash staged + unstaged + untracked (cache/, logs, etc.) so the
          # rebase has a clean working tree — this is the only 100% reliable approach
          git stash push --include-untracked -m "ci: pre-pull stash"

          # Pull any concurrent pushes that landed while the scan was running
          git pull --rebase origin main

          # Restore everything the scanner wrote
          git stash pop

          # Re-stage scan_results and commit if anything actually changed
          git add scan_results/
          git diff --staged --quiet \
            && echo "ℹ️  No data changes — nothing to commit." \
            || git commit -m "📊 Daily Market Update: $(date -u +'%Y-%m-%d %H:%M UTC')"

          git push origin HEAD:main
