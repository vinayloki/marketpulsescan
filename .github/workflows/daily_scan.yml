name: Daily NSE Market Scan + Weekly Backtest

on:
  push:
    branches: [ main ]
  schedule:
    # Daily scanner: 4:30 PM IST (11:00 UTC) Mon–Fri
    - cron: '0 11 * * 1-5'
    # Weekly backtest: Monday 5:00 AM IST (23:30 UTC Sunday)
    - cron: '30 23 * * 0'
  workflow_dispatch:          # manual trigger anytime

permissions:
  contents: write

jobs:
  # ─── DAILY SCAN (Mon–Fri) ─────────────────────────────────────────
  update-scanner-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run MarketPulse Scanner
        run: python scanner.py

      - name: Fetch Market News
        run: python news_fetcher.py

      - name: Update Market Regime
        run: python regime_filter.py
        continue-on-error: true   # non-fatal if NIFTY data temporarily unavailable

      - name: Run AI EOD Intelligence Engine (v2 — Backtested)
        run: python ai_engine.py

      - name: Commit and Push Results
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add scan_results/
          git diff --staged --quiet || git commit -m "Daily Market Update: $(date -u +'%Y-%m-%d %H:%M UTC')"
          git pull --rebase origin main
          git push origin HEAD:main

  # ─── WEEKLY BACKTEST (Monday morning, before market open) ─────────
  weekly-backtest:
    runs-on: ubuntu-latest
    # Only run on schedule (Sunday 23:30 UTC) or manual dispatch
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'schedule' &&
       github.event.schedule == '30 23 * * 0')

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Walk-Forward Backtest (Mode A + B)
        run: python backtest.py --mode AB
        env:
          # Ensure parquet cache is always refreshed on Monday
          FORCE_DOWNLOAD: "true"

      - name: Generate Performance Report
        run: python performance.py

      - name: Commit Backtest Results
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add scan_results/backtest_results.json scan_results/performance_report.json
          git diff --staged --quiet || git commit -m "Weekly Backtest: $(date -u +'%Y-%m-%d') | $(python -c "import json; d=json.load(open('scan_results/performance_report.json')); a=d.get('mode_b',{}).get('win_rate_pct',0); b=d.get('mode_b',{}).get('expectancy_pct',0); print(f'WR={a}% E={b:+.2f}%')" 2>/dev/null || echo 'results pending')"
          git pull --rebase origin main
          git push origin HEAD:main
